{% extends 'base.html' %}
{% block title %}编辑商品 · {{ product.name }}{% endblock %}
{% block content %}
<div style="max-width:700px;margin:0 auto">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="/store/{{ product.store.id }}/products/" class="btn">← 返回商品管理</a>
    <h2 style="margin:0">编辑商品</h2>
  </div>

  <form method="post" enctype="multipart/form-data" class="card" style="padding:24px">
    {% csrf_token %}

    <div class="form-group">
      <label>商品名称 <span style="color:var(--red)">*</span></label>
      <input type="text" name="name" value="{{ product.name }}" required>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label>价格 <span style="color:var(--red)">*</span></label>
        <input type="number" name="price" step="0.01" min="0" value="{{ product.price }}" required>
      </div>
      <div class="form-group">
        <label>库存</label>
        <input type="number" name="stock" min="0" value="{{ product.stock }}">
      </div>
    </div>

    <div class="form-group">
      <label>分类</label>
      <select name="category">
        <option value="">-- 不选分类 --</option>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>关键词</label>
      <input type="text" name="keywords" value="{{ product.keywords }}">
    </div>

    <div class="form-group">
      <label>商品描述</label>
      <textarea name="description" rows="4">{{ product.description }}</textarea>
    </div>

    <div class="form-group">
      <label>商品图片</label>
      {% if product.image %}
      <div style="margin-bottom:8px">
        <img src="{{ product.image.url }}" style="height:80px;border-radius:4px">
        <span style="font-size:12px;color:var(--text-3);margin-left:8px">当前图片，上传新图片将替换</span>
      </div>
      {% endif %}
      <input type="file" name="image" accept="image/*">
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%">保存修改</button>
  </form>
</div>
{% endblock %}
