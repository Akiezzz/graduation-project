{% extends 'base.html' %}
{% block title %}个人资料 · 购物平台{% endblock %}
{% block content %}
<div style="max-width:560px;margin:0 auto">
  <div class="page-header">
    <h1>个人资料</h1>
    <p>管理您的账号信息</p>
  </div>
  <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:28px">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)">
        {% if user.avatar %}
          <img src="{{ user.avatar.url }}" class="avatar-preview" style="width:64px;height:64px">
        {% else %}
          <div style="width:64px;height:64px;border-radius:50%;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700">{{ user.username|slice:":1"|upper }}</div>
        {% endif %}
        <div>
          <div style="font-weight:600;font-size:15px">{{ user.username }}</div>
          <label style="font-size:12px;color:var(--blue);cursor:pointer;margin-top:4px;display:block">
            更换头像
            <input type="file" name="avatar" accept="image/*" style="display:none">
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" value="{{ user.username }}" disabled>
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" name="email" value="{{ user.email }}" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" name="phone" value="{{ user.phone }}" placeholder="请输入手机号">
      </div>
      <div class="form-group">
        <label>默认收货地址</label>
        <textarea name="address" rows="2" placeholder="请输入默认收货地址">{{ user.address }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="height:40px">保存修改</button>
    </form>
  </div>
</div>
{% endblock %}
