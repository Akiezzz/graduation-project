{% extends 'base.html' %}
{% block title %}登录 · 购物平台{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="form-card-title">欢迎回来</div>
    <div class="form-card-sub">登录您的购物平台账号</div>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>用户名</label>
        <input type="text" name="username" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" name="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="height:42px;font-size:15px;margin-top:4px">登录</button>
    </form>
    <p class="form-footer">还没有账号？<a href="/user/register/">立即注册</a></p>
  </div>
</div>
{% endblock %}
