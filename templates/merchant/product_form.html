{% extends 'base_merchant.html' %}
{% block title %}{% if product %}编辑商品{% else %}发布商品{% endif %}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{% if product %}编辑商品{% else %}发布新商品{% endif %}</h1>
</div>
<div style="max-width:640px">
  <div style="background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:28px">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>商品名称</label>
        <input type="text" name="name" value="{{ product.name|default:'' }}" placeholder="请输入商品名称" required>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="form-group">
          <label>价格（元）</label>
          <input type="number" name="price" step="0.01" min="0" value="{{ product.price|default:'' }}" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label>库存数量</label>
          <input type="number" name="stock" min="0" value="{{ product.stock|default:0 }}">
        </div>
      </div>
      <div class="form-group">
        <label>商品分类</label>
        <select name="category" required>
          <option value="">-- 请选择大分类 --</option>
          {% for cat in categories %}
            <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>商品关键词</label>
        <input type="text" name="keywords" value="{{ product.keywords|default:'' }}" placeholder="如：辣条, 麻辣, 零食" required>
      </div>
      <div class="form-group">
        <label>商品描述</label>
        <textarea name="description" rows="4" placeholder="描述商品特点、规格等信息...">{{ product.description|default:'' }}</textarea>
      </div>
      <div class="form-group">
        <label>商品图片</label>
        {% if product.image %}
          <img src="{{ product.image.url }}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;display:block">
        {% endif %}
        <input type="file" name="image" accept="image/*">
      </div>
      {% if product %}
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="is_active" {% if product.is_active %}checked{% endif %} style="width:auto">
            上架销售
          </label>
        </div>
      {% endif %}
      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary" style="flex:1;height:40px">保存</button>
        <a href="/merchant/dashboard/" class="btn" style="flex:1;height:40px">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
